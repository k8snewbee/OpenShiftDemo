apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
        - name: nodejs
          image: image-registry.openshift-image-registry.svc:5000/sonalidtest-dev/nodejs:latest
          ports:
            - containerPort: 3000
